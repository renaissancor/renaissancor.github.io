# Basic site metadata
site_name: Renaissancoriate
site_description: Systems Programming & Software Engineering Portfolio
site_author: Renaissancor
site_url: https://renaissancor.github.io

# Theme configuration
theme:
  name: material
  language: en

  palette:
    scheme: slate
    primary: light green
    accent: green

  font:
    text: Roboto
    code: Fira Code

  features:
    - navigation.top
    - navigation.sections
    - navigation.path
    - content.code.annotate
    - content.code.copy
    - search.highlight
    - search.share
    - toc.follow

# Markdown extensions for enhanced rendering
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums_style: table
      guess_lang: false
      use_pygments: true

  - pymdownx.snippets

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

docs_dir: "docs"

